<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICO Eyes | Pandora Seed</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #05050A; /* Deep Space Dark Mode */
            font-family: 'Courier New', Courier, monospace;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00FFFF; /* Electric Cyan */
            z-index: 10;
            pointer-events: none;
        }
        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00FFFF;
        }
        p {
            margin: 0;
            font-size: 14px;
            color: #57FF14; /* Neon Green */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h1>PICO Eyes Ecosystem</h1>
        <p>System: ONLINE</p>
        <p>Rendering: 100,000 Biomimetic Seeds</p>
        <p>Active Agents: 500 Insect Class</p>
        <p>Interaction: Left Click to Rotate | Scroll to Zoom</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';
        
        import { InsectSwarm } from '../agents/swarm.js';
        import { TerrestrialClass } from '../agents/terrestrial.js';
        import { EndangeredClass } from '../agents/endangered.js'; // <-- ADD THIS

        // 1. Setup Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x05050A, 0.003);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 80);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. Add Orbit Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05; 
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
        
        // TURN OFF THE BROKEN DEFAULT ZOOM
        controls.enableZoom = false; 

        // THE NUCLEAR FIX: Custom hardware-agnostic zoom
        renderer.domElement.addEventListener('wheel', (event) => {
            event.preventDefault(); // Stop default browser scrolling behavior
            
            // Calculate the distance between the camera and the center
            const direction = new THREE.Vector3().subVectors(camera.position, controls.target);
            let currentDistance = direction.length();
            
            // Force the zoom to be exactly 5 units per scroll click
            const zoomAmount = (event.deltaY > 0) ? 5 : -5;
            let newDistance = currentDistance + zoomAmount;
            
            // Lock the boundaries so you can't get lost in the void
            newDistance = Math.max(20, Math.min(250, newDistance));
            
            // Apply the new smooth position
            direction.normalize().multiplyScalar(newDistance);
            camera.position.copy(controls.target).add(direction);
            
        }, { passive: false });

        // 3. SPAWN THE AGENTS
        const beeSwarm = new InsectSwarm(scene, 500);
        const groundSwarm = new TerrestrialClass(scene, 150);
        const giantSwarm = new EndangeredClass(scene, 5); // <-- ADD THIS

        // --- MAGNETIC GRASS VARIABLES ---
        let environmentPoints;
        let originalEnvPositions;

        // 4. Load the Pandora Seed PLY file
        const loader = new PLYLoader();
        loader.load('../seeds/pandora_seed_001.ply', function (geometry) {
            
            const circleCanvas = document.createElement('canvas');
            circleCanvas.width = 32;
            circleCanvas.height = 32;
            const ctx = circleCanvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(16, 16, 16, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            const circleTexture = new THREE.CanvasTexture(circleCanvas);
            
            const material = new THREE.PointsMaterial({
                size: 0.4, 
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                map: circleTexture, 
                alphaTest: 0.5      
            });

            environmentPoints = new THREE.Points(geometry, material);
            scene.add(environmentPoints);

            // SAVE THE ORIGINAL POSITIONS (So grass springs back)
            originalEnvPositions = new Float32Array(geometry.attributes.position.array);
        });

        // 5. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            
            beeSwarm.update(); 
            groundSwarm.update(); 
            giantSwarm.update(); 

            // --- MAGNETIC DISPLACEMENT ENGINE ---
            if (environmentPoints && giantSwarm) {
                const envPos = environmentPoints.geometry.attributes.position.array;
                const giantPos = giantSwarm.points.geometry.attributes.position.array;
                
                // Loop through all 100,000 environment dots
                for(let i = 0; i < envPos.length; i += 3) {
                    let originX = originalEnvPositions[ i ];
                    let originY = originalEnvPositions[ i + 1 ];
                    let originZ = originalEnvPositions[ i + 2 ];

                    // Skip the high atmosphere (gas doesn't get magnetically pushed)
                    if (originY > 25) continue;

                    let dx = 0;
                    let dz = 0;

                    // Check distance to the 5 massive Giants
                    for(let g = 0; g < giantSwarm.count; g++) {
                        let gIndex = g * 3;
                        let gx = giantPos[ gIndex ];
                        let gz = giantPos[ gIndex + 2 ];

                        // Calculate distance squared (faster than Math.sqrt)
                        let distSq = (originX - gx)*(originX - gx) + (originZ - gz)*(originZ - gz);
                        let repulseRadius = 8; // Size of the magnetic footprint
                        let radiusSq = repulseRadius * repulseRadius;

                        // If the dot is inside the giant's magnetic footprint, push it away!
                        if (distSq < radiusSq) {
                            let force = (radiusSq - distSq) / radiusSq; 
                            dx += (originX - gx) * force * 0.3; // Push X
                            dz += (originZ - gz) * force * 0.3; // Push Z
                        }
                    }

                    // Apply the push, or spring back to original position
                    envPos[ i ] = originX + dx;
                    envPos[ i + 2 ] = originZ + dz;
                }
                environmentPoints.geometry.attributes.position.needsUpdate = true;
            }
            
            renderer.render(scene, camera);
        }
        animate();

        // 6. Handle Window Resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
